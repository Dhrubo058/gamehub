<!DOCTYPE html>
<html>
<head>
    <title>Maze Runner</title>
    <style>
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #ffff00;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            border: 2px solid #ffff00;
            box-shadow: 0 0 20px rgba(255, 255, 0, 0.5);
        }
    </style>
</head>
<body>
    <canvas id="game" width="400" height="400"></canvas>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        // Simple Pacman-style clone logic
        let x = 200, y = 200;
        let dx = 0, dy = 0;
        let score = 0;
        const radius = 15;
        
        function draw() {
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, 400, 400);
            
            // Draw "Pacman"
            ctx.beginPath();
            ctx.arc(x, y, radius, 0.2 * Math.PI, 1.8 * Math.PI);
            ctx.lineTo(x, y);
            ctx.fillStyle = 'yellow';
            ctx.fill();
            
            // Move
            x += dx;
            y += dy;
            
            // Wrap around
            if (x < 0) x = 400;
            if (x > 400) x = 0;
            if (y < 0) y = 400;
            if (y > 400) y = 0;
            
            ctx.fillStyle = 'white';
            ctx.font = '20px Arial';
            ctx.fillText(`Score: ${score}`, 10, 30);
            
            requestAnimationFrame(draw);
        }
        
        window.addEventListener('keydown', e => {
            switch(e.key) {
                case 'ArrowUp': dx = 0; dy = -2; break;
                case 'ArrowDown': dx = 0; dy = 2; break;
                case 'ArrowLeft': dx = -2; dy = 0; break;
                case 'ArrowRight': dx = 2; dy = 0; break;
            }
            score++; // Simulate movement score
        });
        
        draw();
    </script>
</body>
</html>
