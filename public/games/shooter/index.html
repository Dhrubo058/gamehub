<!DOCTYPE html>
<html>
<head>
    <title>Space Shooter</title>
    <style>
        body { background: #000; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; color: #00f3ff; font-family: monospace; }
        canvas { border: 2px solid #00f3ff; box-shadow: 0 0 20px #00f3ff; }
        #ui { position: absolute; top: 10px; left: 10px; }
    </style>
</head>
<body>
    <div id="ui">SCORE: <span id="score">0</span></div>
    <canvas id="game" width="400" height="600"></canvas>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');

        let score = 0;
        let player = { x: 200, y: 550, w: 30, h: 30 };
        let bullets = [];
        let enemies = [];
        let keys = {};

        function spawnEnemy() {
            enemies.push({ x: Math.random() * 370, y: -30, w: 30, h: 30, speed: 2 + Math.random() * 2 });
        }

        function update() {
            if (keys['ArrowLeft'] && player.x > 0) player.x -= 5;
            if (keys['ArrowRight'] && player.x < 370) player.x += 5;
            if (keys[' '] && bullets.length < 5) {
                bullets.push({ x: player.x + 12, y: player.y, w: 6, h: 15 });
                keys[' '] = false; // Simple semi-auto
            }

            bullets.forEach((b, i) => {
                b.y -= 7;
                if (b.y < 0) bullets.splice(i, 1);
            });

            enemies.forEach((e, i) => {
                e.y += e.speed;
                if (e.y > 600) enemies.splice(i, 1);

                // Collision with player
                if (e.x < player.x + player.w && e.x + e.w > player.x && e.y < player.y + player.h && e.y + e.h > player.y) {
                    alert("GAME OVER! SCORE: " + score);
                    location.reload();
                }

                // Collision with bullets
                bullets.forEach((b, bi) => {
                    if (b.x < e.x + e.w && b.x + b.w > e.x && b.y < e.y + e.h && b.y + b.h > e.y) {
                        enemies.splice(i, 1);
                        bullets.splice(bi, 1);
                        score += 100;
                        scoreEl.innerText = score;
                    }
                });
            });

            if (Math.random() < 0.02) spawnEnemy();
        }

        function draw() {
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, 400, 600);

            // Player
            ctx.fillStyle = '#bc13fe';
            ctx.fillRect(player.x, player.y, player.w, player.h);

            // Bullets
            ctx.fillStyle = '#ffff00';
            bullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

            // Enemies
            ctx.fillStyle = '#00f3ff';
            enemies.forEach(e => ctx.fillRect(e.x, e.y, e.w, e.h));

            update();
            requestAnimationFrame(draw);
        }

        window.addEventListener('keydown', e => keys[e.key] = true);
        window.addEventListener('keyup', e => keys[e.key] = false);

        draw();
    </script>
</body>
</html>
