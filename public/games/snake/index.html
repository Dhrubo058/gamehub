<!DOCTYPE html>
<html>
<head>
    <title>Neon Snake</title>
    <style>
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #bc13fe;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            border: 2px solid #bc13fe;
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.5);
        }
        #ui {
            position: absolute;
            top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h2 id="score">SCORE: 0</h2>
    </div>
    <canvas id="game" width="400" height="400"></canvas>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        let score = 0;
        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15};
        let dx = 0;
        let dy = 0;
        let nextDx = 1;
        let nextDy = 0;
        const gridSize = 20;
        const tileCount = 20;

        function draw() {
            dx = nextDx;
            dy = nextDy;
            
            // Move snake
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            // Wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                reset();
                return;
            }
            
            // Self collision
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                reset();
                return;
            }

            snake.unshift(head);

            // Food collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.innerText = `SCORE: ${score}`;
                placeFood();
            } else {
                snake.pop();
            }

            // Clear canvas
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw food
            ctx.fillStyle = '#00f3ff';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#00f3ff';
            ctx.fillRect(food.x * gridSize + 2, food.y * gridSize + 2, gridSize - 4, gridSize - 4);

            // Draw snake
            ctx.fillStyle = '#bc13fe';
            ctx.shadowColor = '#bc13fe';
            snake.forEach((segment, index) => {
                ctx.globalAlpha = 1 - (index / snake.length) * 0.5;
                ctx.fillRect(segment.x * gridSize + 1, segment.y * gridSize + 1, gridSize - 2, gridSize - 2);
            });
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
        }

        function placeFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            if (snake.some(segment => segment.x === food.x && segment.y === food.y)) {
                placeFood();
            }
        }

        function reset() {
            snake = [{x: 10, y: 10}];
            nextDx = 1;
            nextDy = 0;
            score = 0;
            scoreElement.innerText = `SCORE: ${score}`;
            placeFood();
        }

        window.addEventListener('keydown', e => {
            switch(e.key) {
                case 'ArrowUp': if (dy === 0) { nextDx = 0; nextDy = -1; } break;
                case 'ArrowDown': if (dy === 0) { nextDx = 0; nextDy = 1; } break;
                case 'ArrowLeft': if (dx === 0) { nextDx = -1; nextDy = 0; } break;
                case 'ArrowRight': if (dx === 0) { nextDx = 1; nextDy = 0; } break;
            }
        });

        setInterval(draw, 100);
    </script>
</body>
</html>
