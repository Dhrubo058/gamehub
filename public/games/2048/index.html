<!DOCTYPE html>
<html>
<head>
    <title>2048 Arcade</title>
    <style>
        body { background: #0f0f0f; color: #fff; font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        #game-container { width: 320px; }
        .grid { background: #1a1a1a; border-radius: 6px; width: 320px; height: 320px; position: relative; padding: 10px; box-sizing: border-box; }
        .cell { width: 65px; height: 65px; background: rgba(255,255,255,0.05); border-radius: 3px; float: left; margin: 5px; }
        .tile { width: 65px; height: 65px; border-radius: 3px; position: absolute; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 24px; transition: all 0.1s ease; }
        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: #f9f6f2; }
        .tile-16 { background: #f59563; color: #f9f6f2; }
        .tile-32 { background: #f67c5f; color: #f9f6f2; }
        .tile-64 { background: #f65e3b; color: #f9f6f2; }
        .tile-128 { background: #edcf72; color: #f9f6f2; font-size: 20px; }
        .tile-256 { background: #edcc61; color: #f9f6f2; font-size: 20px; }
        .tile-512 { background: #edc850; color: #f9f6f2; font-size: 20px; }
        .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 16px; }
        .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 16px; box-shadow: 0 0 10px #edc22e; }
        #score { font-size: 24px; margin-bottom: 10px; color: #00f3ff; font-family: monospace; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="score">SCORE: 0</div>
        <div class="grid" id="grid">
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        </div>
    </div>
    <script>
        const grid = document.getElementById('grid');
        const scoreDisplay = document.getElementById('score');
        let board = Array(16).fill(0);
        let score = 0;

        function init() {
            addTile(); addTile();
            draw();
        }

        function addTile() {
            let empty = board.map((v, i) => v === 0 ? i : null).filter(v => v !== null);
            if (empty.length > 0) {
                board[empty[Math.floor(Math.random() * empty.length)]] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        function draw() {
            const tiles = document.querySelectorAll('.tile');
            tiles.forEach(t => t.remove());
            board.forEach((val, i) => {
                if (val !== 0) {
                    const tile = document.createElement('div');
                    tile.className = `tile tile-${val}`;
                    tile.innerText = val;
                    tile.style.left = `${(i % 4) * 75 + 15}px`;
                    tile.style.top = `${Math.floor(i / 4) * 75 + 15}px`;
                    grid.appendChild(tile);
                }
            });
            scoreDisplay.innerText = `SCORE: ${score}`;
        }

        function move(dir) {
            let moved = false;
            const rows = dir === 'left' || dir === 'right' ? [0,1,2,3].map(i => [i*4, i*4+1, i*4+2, i*4+3]) : [0,1,2,3].map(i => [i, i+4, i+8, i+12]);
            if (dir === 'right' || dir === 'down') rows.forEach(r => r.reverse());

            rows.forEach(row => {
                let vals = row.map(i => board[i]).filter(v => v !== 0);
                for (let i = 0; i < vals.length - 1; i++) {
                    if (vals[i] === vals[i+1]) {
                        vals[i] *= 2;
                        score += vals[i];
                        vals.splice(i+1, 1);
                        moved = true;
                    }
                }
                let newRow = vals.concat(Array(4 - vals.length).fill(0));
                row.forEach((idx, i) => {
                    if (board[idx] !== newRow[i]) moved = true;
                    board[idx] = newRow[i];
                });
            });

            if (moved) {
                addTile();
                draw();
            }
        }

        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft') move('left');
            if (e.key === 'ArrowRight') move('right');
            if (e.key === 'ArrowUp') move('up');
            if (e.key === 'ArrowDown') move('down');
        });

        init();
    </script>
</body>
</html>
