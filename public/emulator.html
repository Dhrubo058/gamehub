<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EmulatorJS Player</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        #game {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="game"></div>
    <div id="loading-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#000; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:10000; font-family:monospace; color:#fff100;">
        <div style="font-size:20px; margin-bottom:20px; letter-spacing:2px;">INITIALIZING SYSTEM...</div>
        <div id="progress-bar" style="width:200px; height:4px; background:#222; border-radius:2px; overflow:hidden;">
            <div id="progress-fill" style="width:0%; height:100%; background:#e60012; transition:width 0.3s;"></div>
        </div>
        <div id="status-text" style="margin-top:15px; font-size:10px; color:#666;">LOADING ASSETS</div>
    </div>
    <div id="error-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); color:#e60012; flex-direction:column; justify-content:center; align-items:center; font-family:monospace; text-align:center; padding:20px; z-index:11000;">
        <h1 style="font-size:24px; margin-bottom:20px; border-bottom:2px solid #e60012; padding-bottom:10px;">HARDWARE FAILURE</h1>
        <p id="error-msg" style="font-size:14px; max-width:600px; line-height:1.6; white-space:pre-wrap;"></p>
        <button onclick="location.reload()" style="margin-top:30px; background:#e60012; color:#white; border:none; padding:10px 20px; font-family:monospace; cursor:pointer;">REBOOT SYSTEM</button>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const rom = urlParams.get('rom');
        const core = urlParams.get('core') || 'fbneo'; // Use fbneo as default for better Neo Geo support
        const bios = urlParams.get('bios') || '/bios/neogeo.zip';

        const statusText = document.getElementById('status-text');
        const progressFill = document.getElementById('progress-fill');

        function showError(msg) {
            document.getElementById('loading-overlay').style.display = 'none';
            document.getElementById('error-overlay').style.display = 'flex';
            document.getElementById('error-msg').innerText = msg;
        }

        if (!rom) {
            showError('CRITICAL ERROR: NO ROM PATH SPECIFIED');
        }

        window.EJS_player = "#game";
        window.EJS_core = core;
        window.EJS_gameUrl = rom;
        window.EJS_biosUrl = bios;
        window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
        window.EJS_startOnLoaded = true;
        
        // EmulatorJS event hooks
        window.EJS_onGameStart = () => {
            document.getElementById('loading-overlay').style.display = 'none';
            console.log('Emulation started successfully');
        };

        // Pre-flight checks
        async function checkFile(url, name) {
            statusText.innerText = `CHECKING ${name}...`;
            try {
                const res = await fetch(url, { method: 'HEAD' });
                if (!res.ok) throw new Error(`${name} NOT FOUND (404)`);
                return true;
            } catch (e) {
                showError(`FILE ACCESS ERROR\n${name} is missing or inaccessible.\nPath: ${url}\n\nEnsure you have uploaded the file to the correct directory.`);
                return false;
            }
        }

        async function init() {
            progressFill.style.width = '20%';
            if (await checkFile(rom, 'ROM FILE')) {
                progressFill.style.width = '50%';
                if (await checkFile(bios, 'BIOS FILE')) {
                    progressFill.style.width = '80%';
                    statusText.innerText = 'STARTING EMULATOR...';
                    
                    const script = document.createElement('script');
                    script.src = "https://cdn.emulatorjs.org/stable/data/loader.js";
                    script.onerror = () => showError('FAILED TO LOAD EMULATOR ENGINE\nCheck your internet connection.');
                    document.body.appendChild(script);
                }
            }
        }

        init();
    </script>
</body>
</html>
